name: Auto Blog Post

on:
  schedule:
    - cron: '0 23 * * *'  # 08:00 JST
    - cron: '0 4 * * *'   # 13:00 JST
    - cron: '0 11 * * *'  # 20:00 JST
  workflow_dispatch:       # 手動実行ボタン

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          ARTICLE_LANGUAGE: Japanese
          ARTICLE_MIN_CHARS: "1500"
          POST_TIMES: "08:00,13:00,20:00"
          PRODUCT_PRICE: ${{ secrets.PRODUCT_PRICE }}
          PRODUCT_PASSWORD: ${{ secrets.PRODUCT_PASSWORD }}
          ENABLE_PRODUCT: ${{ secrets.ENABLE_PRODUCT }}
          STRIPE_PAYMENT_URL: ${{ secrets.STRIPE_PAYMENT_URL }}
          THANKS_PAGE_URL: ${{ secrets.THANKS_PAGE_URL }}
        run: python main.py post-one

      - name: Save state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add used_keywords.txt published_articles.json
          git diff --staged --quiet || git commit -m "chore: update post state [skip ci]"
          git push
